name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  bun:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Setup Bun cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-wyw-v2-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-wyw-v2-bun-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: ESLint
        run: bun run lint

      - name: Tests
        run: bun run --filter './apps/*' --filter './e2e/bun' --filter './examples/*' --filter './packages/*' --if-present test

  node-smoke:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node-version: [22.x, 24.x]
        include:
          - os: windows-latest
            node-version: 22.x

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.5

      - name: Setup Bun cache
        if: runner.os != 'Windows'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-wyw-v2-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-wyw-v2-bun-
            ${{ runner.os }}-wyw-v2-bun-

      - name: Setup Bun cache (Windows exact match only)
        if: runner.os == 'Windows'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-wyw-v2-bun-${{ hashFiles('bun.lock') }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Node smoke
        run: bun run --filter @wyw-in-js/e2e-vite test

      - name: Parcel smoke
        run: bun run --filter @wyw-in-js/e2e-parcel test

      - name: Vite dev smoke
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-vite test:dev

      - name: Webpack e2e
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-webpack test

      - name: Rollup e2e
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-rollup test

      - name: esbuild e2e
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-esbuild test

      - name: Next (webpack) e2e
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-next-webpack test

      - name: Next (turbopack) e2e
        if: runner.os == 'Linux' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-next-turbopack test

      # Coverage strategy (cost-aware):
      # - Linux + Node 22: full adapter suite (authoritative baseline).
      # - Linux + Node 24: representative adapter checks for Node runtime drift:
      #   webpack, rollup, esbuild, next-webpack, next-turbopack.
      # - Windows + Node 22: representative platform checks:
      #   vite/parcel smoke (already above), webpack, rollup, esbuild.
      # This keeps CI cost bounded while still covering major adapters on
      # non-baseline runtime/platform lanes.
      - name: Webpack e2e (Node 24 lane)
        if: runner.os == 'Linux' && matrix.node-version == '24.x'
        run: bun run --filter @wyw-in-js/e2e-webpack test

      - name: Rollup e2e (Node 24 lane)
        if: runner.os == 'Linux' && matrix.node-version == '24.x'
        run: bun run --filter @wyw-in-js/e2e-rollup test

      - name: esbuild e2e (Node 24 lane)
        if: runner.os == 'Linux' && matrix.node-version == '24.x'
        run: bun run --filter @wyw-in-js/e2e-esbuild test

      - name: Next (webpack) e2e (Node 24 lane)
        if: runner.os == 'Linux' && matrix.node-version == '24.x'
        run: bun run --filter @wyw-in-js/e2e-next-webpack test

      - name: Next (turbopack) e2e (Node 24 lane)
        if: runner.os == 'Linux' && matrix.node-version == '24.x'
        run: bun run --filter @wyw-in-js/e2e-next-turbopack test

      - name: Webpack e2e (Windows lane)
        if: runner.os == 'Windows' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-webpack test

      - name: Rollup e2e (Windows lane)
        if: runner.os == 'Windows' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-rollup test

      - name: esbuild e2e (Windows lane)
        if: runner.os == 'Windows' && matrix.node-version == '22.x'
        run: bun run --filter @wyw-in-js/e2e-esbuild test
